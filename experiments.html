<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiments, Aidan Martin</title>
  <meta name="description" content="Small front-end experiments and prototypes by Aidan Martin.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 14px; scroll-behavior: smooth; }

    @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff; color: #111; line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .skip-link {
      position: absolute; top: -100%; left: 1rem;
      background: #111; color: #fff;
      padding: 0.5rem 1rem; font-size: 1rem;
      border-radius: 0 0 4px 4px; text-decoration: none; z-index: 999;
    }
    .skip-link:focus { top: 0; }

    :focus-visible { outline: 2px solid #111; outline-offset: 3px; border-radius: 2px; }

    .site-name {
      position: fixed; left: 2.5rem; top: 2rem;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px; font-weight: 500; color: #111;
      text-decoration: none; z-index: 10;
    }
    .site-name:hover { color: #444; }

    .site-nav {
      position: fixed; left: 2.5rem; top: 4rem;
      display: flex; flex-direction: column; gap: 0.2rem; z-index: 10;
    }

    .site-nav a {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px; font-weight: 400; color: #999;
      text-decoration: none; line-height: 1.6;
      padding-left: 1em; transition: color 0.15s;
    }

    .site-nav a:hover { color: #444; }

    .site-nav a[aria-current="page"] { color: #111; padding-left: 0; }

    .site-nav a[aria-current="page"]::before {
      content: "●";
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px; margin-right: 0.35em;
      vertical-align: middle; position: relative; top: -1px;
    }

    main {
      max-width: 450px; margin: 0 auto; padding: 2rem;
    }

    header { margin-bottom: 3rem; }

    .header-intro {
      font-size: 1.25rem; font-weight: 500; color: #222; line-height: 1.8;
    }

    .label {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 0.7143rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #666; margin-bottom: 1.25rem;
    }

    .experiments-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .tile {
      text-decoration: none; color: inherit; display: block;
    }

    .tile-thumb {
      aspect-ratio: 4 / 3;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 0.625rem;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }

    .tile:hover .tile-thumb { opacity: 0.75; }

    .tile-thumb-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem; font-weight: 600; color: #ddd;
      letter-spacing: -0.04em; user-select: none;
    }

    .tile-title {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 0.8rem; font-weight: 500; color: #111; margin-bottom: 0.2rem;
    }

    .tile-desc { font-size: 0.857rem; color: #666; line-height: 1.5; }

    footer {
      max-width: 450px; margin: 0 auto;
      padding: 1.5rem 2rem 2rem;
      border-top: 1px solid #ebebeb;
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 0.5rem;
    }

    .footer-name {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 0.8571rem; font-weight: 600; color: #333;
    }

    .footer-links { font-size: 0.8571rem; display: flex; gap: 1.25rem; }

    .footer-links a {
      color: #595959; text-decoration: underline;
      text-underline-offset: 3px; text-decoration-color: #bbb; transition: color 0.15s;
    }
    .footer-links a:hover { color: #111; }

    @media (max-width: 680px) {
      .site-name { position: static; }
      .site-nav { position: static; flex-direction: row; gap: 1.25rem; padding: 0.5rem 2rem 0; }
      .site-nav a { padding-left: 0; }
      main { padding-top: 2rem; }
      .experiments-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<a href="#main" class="skip-link">Skip to main content</a>
<a href="/" class="site-name">Aidan Martin</a>

<nav class="site-nav" aria-label="Site navigation">
  <a href="/me">Me</a>
  <a href="/experiments" aria-current="page">Experiments</a>
</nav>

<main id="main">

  <header>
    <h1 class="sr-only">Experiments, Aidan Martin</h1>
    <p class="header-intro">Small front-end experiments and prototypes.</p>
  </header>

  <section aria-labelledby="label-experiments">
    <h2 class="label" id="label-experiments">All experiments</h2>
    <div class="experiments-grid">
      <!-- Tiles go here -->
    </div>
  </section>

</main>

<footer>
  <span class="footer-name">Aidan Martin</span>
  <div class="footer-links">
    <a href="https://www.linkedin.com/in/aidanmartindesigner/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    <a class="email-link" href="#" aria-label="Send email to Aidan Martin">Email</a>
    <span style="color:#ddd">Glasgow, UK</span>
  </div>
</footer>

<script>
  const el = document.querySelector('.email-link');
  if (el) el.href = 'mailto:' + 'aidanisavenue' + '@' + 'gmail.com';
</script>

</body>
</html>
