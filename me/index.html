<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Me — Aidan Martin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 14px; scroll-behavior: smooth; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .skip-link {
      position: absolute; top: -100%; left: 1rem;
      background: #111; color: #fff;
      padding: 0.5rem 1rem; font-size: 1rem;
      border-radius: 0 0 4px 4px;
      text-decoration: none; z-index: 999;
    }
    .skip-link:focus { top: 0; }

    :focus-visible {
      outline: 2px solid #111;
      outline-offset: 3px;
      border-radius: 2px;
    }

    .site-name {
      position: fixed;
      left: 2.5rem; top: 2rem;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px; font-weight: 500;
      color: #111; text-decoration: none;
      z-index: 10;
    }
    .site-name:hover { color: #444; }

    main {
      max-width: 450px;
      margin: 0 auto;
      padding: 2rem;
    }

    header { margin-bottom: 3rem; }

    .header-intro {
      font-size: 1.25rem;
      font-weight: 500;
      color: #222;
      line-height: 1.8;
    }

    section { margin-bottom: 2.5rem; }

    .label {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 0.7143rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 1rem;
    }

    .prose p {
      font-size: 1rem;
      color: #222;
      margin-bottom: 1rem;
    }
    .prose p:last-child { margin-bottom: 0; }

    footer {
      max-width: 450px;
      margin: 0 auto;
      padding: 1.5rem 2rem 2rem;
      border-top: 1px solid #ebebeb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .footer-name {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 0.8571rem;
      font-weight: 600;
      color: #333;
    }

    .footer-links {
      font-size: 0.8571rem;
      display: flex;
      gap: 1.25rem;
    }

    .footer-links a {
      color: #595959;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: #bbb;
      transition: color 0.15s;
    }
    .footer-links a:hover { color: #111; }

    .site-header { display: contents; }

    @media (max-width: 680px) {
      .site-header {
        display: flex;
        align-items: center;
        padding: 2rem 2rem 0;
      }
      .site-name { position: static; font-size: 16px; }
      main { padding-top: 2rem; }
    }
  </style>
</head>
<body>
